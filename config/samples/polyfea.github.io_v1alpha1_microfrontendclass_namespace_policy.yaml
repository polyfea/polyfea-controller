# MicroFrontendClass is cluster-scoped, so these resources carry no namespace.
# The namespacePolicy decides which namespaces may attach MicroFrontends to the class.
apiVersion: polyfea.github.io/v1alpha1
kind: MicroFrontendClass
metadata:
  name: microfrontendclass-with-namespace-policy
spec:
  baseUri: "https://example.com"
  title: "Example Frontend with Namespace Policy"
  # This namespace policy allows MicroFrontends from specific namespaces only
  namespacePolicy:
    from: FromNamespaces
    namespaces:
      - default
      - production
      - staging
---
apiVersion: polyfea.github.io/v1alpha1
kind: MicroFrontendClass
metadata:
  name: microfrontendclass-single-namespace
spec:
  baseUri: "https://example2.com"
  title: "Example Frontend - Single Namespace Only"
  # This namespace policy allows MicroFrontends from the 'production' namespace only
  namespacePolicy:
    from: FromNamespaces
    namespaces:
      - production
---
apiVersion: polyfea.github.io/v1alpha1
kind: MicroFrontendClass
metadata:
  name: microfrontendclass-all-namespaces
spec:
  baseUri: "https://example3.com"
  title: "Example Frontend - All Namespaces"
  # This namespace policy allows MicroFrontends from all namespaces (default)
  namespacePolicy:
    from: All

apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  labels:
    app.kubernetes.io/name: polyfea-controller
    app.kubernetes.io/managed-by: kustomize
  name: webcomponent-sample
spec:
  # Reference to a microfrontend from which the webcomponent would be served.
  # namespace is optional and defaults to the WebComponent's own namespace.
  microFrontend:
    name: "microfrontend-sample"
  
  # The HTML element tag name
  element: "my-web-component"
  
  # Attributes for the web component. Each attribute carries either a literal `value`
  # or a `microfrontendPath` that the controller resolves to a proxied URL.
  attributes:
    - name: "title"
      value: "Sample Component"
    # microfrontendPath resolves to ./polyfea/proxy/<namespace>/<microfrontend>/<hash>/<path>.
    # microfrontend (and its namespace) default to this WebComponent's microFrontend.
    - name: "config-src"
      microfrontendPath:
        path: "assets/config.json"
  
  # Display rules that determine when this component should be loaded
  displayRules:
    - allOf:
        - context-name: "shell"
  
  # Priority for ordering (higher numbers = higher priority)
  priority: 0
  
  # Styles to apply to the component
  style:
    - name: "display"
      value: "block"
